<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details | African Artifacts</title>
  <script src="js/preloader.js"></script>
  <script src="js/notifications.js"></script>
  
  <style>
    /* ========================================
       CSS RESET & BASE STYLES
       ======================================== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #c9a962;
      --primary-dark: #a88a4a;
      --secondary: #8b5a2b;
      --dark: #1a1a1a;
      --darker: #0f0f0f;
      --light: #f5f5f5;
      --white: #ffffff;
      --gray: #888888;
      --success: #4ade80;
      --transition: all 0.3s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--dark);
      color: var(--light);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    /* ========================================
       HEADER & NAVIGATION
       ======================================== */
    .main-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: linear-gradient(180deg, rgba(26, 26, 26, 0.98) 0%, rgba(26, 26, 26, 0.92) 100%);
      backdrop-filter: blur(12px);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(201, 169, 98, 0.15);
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 2px;
    }

    .logo span {
      color: var(--white);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: var(--transition);
      border: none;
    }

    .header-btn.login {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .header-btn.login:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      color: var(--primary);
    }

    .header-btn.signup {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #1a1a1a;
    }

    .header-btn.signup:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(201, 169, 98, 0.35);
    }

    .cart-icon-btn {
      position: relative;
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
    }

    .cart-icon-btn svg {
      width: 22px;
      height: 22px;
      fill: var(--white);
      transition: var(--transition);
    }

    .cart-icon-btn:hover svg {
      fill: var(--primary);
    }

    .cart-badge {
      position: absolute;
      top: -2px;
      right: -2px;
      background: var(--primary);
      color: #1a1a1a;
      font-size: 0.65rem;
      font-weight: 800;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
    }

    /* Main Navigation */
    .main-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.7rem 2rem;
      background: rgba(0, 0, 0, 0.25);
    }

    .nav-links {
      display: flex;
      list-style: none;
      gap: 2.5rem;
    }

    .nav-links a {
      color: rgba(255, 255, 255, 0.85);
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      transition: var(--transition);
    }

    .nav-links a:hover {
      color: var(--primary);
    }

    /* ========================================
       BREADCRUMB
       ======================================== */
    .breadcrumb {
      padding: 1.2rem 2rem;
      background: var(--darker);
      border-bottom: 1px solid rgba(201, 169, 98, 0.1);
    }

    .breadcrumb a {
      color: var(--primary);
      transition: var(--transition);
    }

    .breadcrumb a:hover {
      text-decoration: underline;
    }

    .breadcrumb span {
      color: var(--gray);
    }

    /* ========================================
       PRODUCT DETAILS CONTAINER
       ======================================== */
    .product-details-wrapper {
      max-width: 1400px;
      margin: 0 auto;
      padding: 3rem 2rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      margin-top: 80px;
    }

    /* Image Gallery */
    .product-gallery {
      position: sticky;
      top: 120px;
    }

    .main-image-container {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      background: var(--darker);
      margin-bottom: 1rem;
      border: 1px solid rgba(201, 169, 98, 0.15);
    }

    .main-image {
      width: 100%;
      height: 520px;
      object-fit: contain;
      transition: transform 0.5s ease;
    }

    .main-image-container:hover .main-image {
      transform: scale(1.05);
    }

    .image-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
    }

    .main-image-container:hover .image-nav {
      opacity: 1;
    }

    .image-nav:hover {
      background: var(--primary);
      transform: translateY(-50%) scale(1.1);
    }

    .image-nav.prev {
      left: 1rem;
    }

    .image-nav.next {
      right: 1rem;
    }

    .thumbnail-container {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .thumbnail {
      width: 90px;
      height: 90px;
      border-radius: 10px;
      object-fit: contain;
      cursor: pointer;
      border: 2px solid transparent;
      transition: var(--transition);
    }

    .thumbnail:hover {
      border-color: rgba(201, 169, 98, 0.5);
    }

    .thumbnail.active {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(201, 169, 98, 0.3);
    }

    /* Product Info */
    .product-info {
      padding: 1rem 0;
    }

    .product-category {
      color: var(--primary);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      margin-bottom: 0.8rem;
    }

    .product-title {
      font-size: 2.4rem;
      font-weight: 800;
      margin-bottom: 1rem;
      line-height: 1.2;
    }

    .product-price {
      font-size: 2rem;
      font-weight: 800;
      color: var(--success);
      margin-bottom: 1.5rem;
    }

    .product-price .original-price {
      font-size: 1.2rem;
      color: var(--gray);
      text-decoration: line-through;
      margin-left: 1rem;
    }

    .product-description {
      color: rgba(255, 255, 255, 0.75);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    /* Option Sections */
    .option-section {
      margin-bottom: 1.8rem;
    }

    .option-label {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .option-label span {
      color: var(--gray);
      font-weight: normal;
    }

    /* Variant Image Options */
    .variant-options {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .variant-option {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.1);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      background: var(--darker);
    }

    .variant-option img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .variant-option:hover {
      transform: translateY(-3px);
      border-color: rgba(201, 169, 98, 0.5);
    }

    .variant-option.selected {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(201, 169, 98, 0.4);
    }

    .variant-option.selected::after {
      content: '✓';
      position: absolute;
      top: 5px;
      right: 5px;
      background: var(--primary);
      color: #1a1a1a;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 900;
    }

    /* Size Options */
    .size-options {
      display: flex;
      gap: 0.7rem;
      flex-wrap: wrap;
    }

    .size-option {
      min-width: 55px;
      padding: 0.7rem 1.1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: var(--white);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }

    .size-option:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(255, 255, 255, 0.35);
    }

    .size-option.selected {
      background: var(--primary);
      border-color: var(--primary);
      color: #1a1a1a;
      box-shadow: 0 4px 15px rgba(201, 169, 98, 0.35);
    }

    .size-guide-link {
      color: var(--primary);
      font-size: 0.85rem;
      text-decoration: underline;
      cursor: pointer;
      margin-left: auto;
    }

    .size-guide-link:hover {
      color: var(--primary-dark);
    }

    /* Quantity */
    .quantity-selector {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .quantity-btn {
      width: 42px;
      height: 42px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: var(--white);
      font-size: 1.2rem;
      cursor: pointer;
      transition: var(--transition);
    }

    .quantity-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #1a1a1a;
    }

    .quantity-value {
      font-size: 1.2rem;
      font-weight: 700;
      min-width: 45px;
      text-align: center;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
    }

    .add-to-cart-btn {
      flex: 1;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border: none;
      border-radius: 50px;
      color: #1a1a1a;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 6px 25px rgba(201, 169, 98, 0.4);
    }

    .add-to-cart-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 35px rgba(201, 169, 98, 0.55);
    }

    .wishlist-btn {
      width: 56px;
      height: 56px;
      background: rgba(255, 255, 255, 0.08);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      color: var(--white);
      font-size: 1.4rem;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wishlist-btn:hover {
      background: rgba(255, 107, 107, 0.15);
      border-color: #ff6b6b;
      color: #ff6b6b;
      transform: scale(1.08);
    }

    /* Product Features */
    .product-features {
      margin-top: 2.5rem;
      padding: 1.8rem;
      background: rgba(201, 169, 98, 0.06);
      border: 1px solid rgba(201, 169, 98, 0.15);
      border-radius: 14px;
    }

    .product-features h3 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: var(--primary);
      font-weight: 700;
    }

    .feature-list {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.6rem;
    }

    .feature-list li {
      padding: 0.5rem 0;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
    }

    .feature-list li::before {
      content: '✓';
      color: var(--success);
      font-weight: bold;
      font-size: 0.85rem;
    }

    /* ========================================
       CUSTOM POPUPS
       ======================================== */
    .custom-popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 9999;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .custom-popup.active {
      display: flex;
    }

    .popup-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(5px);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .popup-container {
      background: linear-gradient(145deg, var(--dark) 0%, #141414 100%);
      border-radius: 24px;
      max-width: 480px;
      width: 100%;
      position: relative;
      animation: popupSlideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(201, 169, 98, 0.25);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      overflow: hidden;
    }

    @keyframes popupSlideIn {
      from { 
        opacity: 0; 
        transform: scale(0.8) translateY(20px); 
      }
      to { 
        opacity: 1; 
        transform: scale(1) translateY(0); 
      }
    }

    /* Drawer Style for Size Guide */
    .popup-drawer .popup-container {
      position: absolute;
      top: 0;
      right: -100%;
      height: 100%;
      max-width: 500px;
      border-radius: 0;
      border-left: 1px solid rgba(201, 169, 98, 0.2);
      animation: drawerSlideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      display: flex;
      flex-direction: column;
    }

    @keyframes drawerSlideIn {
      from { right: -100%; }
      to { right: 0; }
    }

    .popup-drawer.active .popup-container {
      right: 0;
    }

    .popup-drawer .popup-body {
      padding: 2.5rem;
      height: 100%;
      overflow-y: auto;
    }

    .popup-drawer .popup-close {
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255, 255, 255, 0.05);
    }

    .popup-container.popup-success {
      border-color: rgba(74, 222, 128, 0.3);
    }

    .popup-container.popup-info {
      border-color: rgba(201, 169, 98, 0.3);
    }

    .popup-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 2rem auto 1rem;
      animation: iconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
    }

    @keyframes iconPop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .popup-info .popup-icon {
      background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
    }

    .popup-icon svg {
      width: 40px;
      height: 40px;
      fill: var(--dark);
    }

    .popup-info .popup-icon svg {
      fill: white;
    }

    .popup-header {
      padding: 0 2rem;
      text-align: center;
    }

    .popup-header h3 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.5rem;
    }

    .popup-body {
      padding: 1.5rem 2rem;
      text-align: center;
    }

    .popup-body p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .popup-body .item-details {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 255, 255, 0.04);
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
      text-align: left;
    }

    .size-guide-link {
      color: var(--primary);
      text-decoration: underline;
      cursor: pointer;
      font-size: 0.85rem;
      margin-left: 1rem;
      font-weight: 500;
      transition: var(--transition);
    }

    .size-guide-link:hover {
      color: var(--white);
    }

    .popup-large {
      max-width: 600px;
    }

    .size-guide-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      color: var(--white);
      text-align: left;
    }

    .size-guide-table th {
      background: rgba(201, 169, 98, 0.15);
      color: var(--primary);
      padding: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    .size-guide-table td {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      font-size: 0.95rem;
    }

    .size-guide-table tr:last-child td {
      border-bottom: none;
    }

    .size-guide-table tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    .popup-close {
      position: absolute;
      right: 1.5rem;
      top: 1.5rem;
      background: rgba(255, 255, 255, 0.05);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: var(--transition);
      z-index: 10;
    }

    .popup-close:hover {
      background: rgba(239, 68, 68, 0.2);
      transform: rotate(90deg);
    }

    .popup-close svg {
      width: 20px;
      height: 20px;
      fill: var(--white);
    }

    .item-details-content {
      flex: 1;
    }

    .popup-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 1.5rem;
      text-align: center;
      display: block;
      width: 100%;
    }

    .popup-body .item-details img {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
    }

    .popup-body .item-info {
      text-align: left;
    }

    .popup-body .item-name {
      font-weight: 600;
      color: var(--white);
      font-size: 0.95rem;
    }

    .popup-body .item-meta {
      font-size: 0.85rem;
      color: var(--gray);
    }

    .popup-body .item-price {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.1rem;
      text-align: right;
    }

    .popup-footer {
      padding: 1rem 2rem 2rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .popup-btn {
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      border: none;
    }

    .popup-btn.primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--dark);
    }

    .popup-btn.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(201, 169, 98, 0.4);
    }

    .popup-btn.secondary {
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.2);
      color: var(--white);
    }

    .popup-btn.secondary:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .popup-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }

    .popup-close:hover {
      background: var(--primary);
      transform: rotate(90deg);
    }

    .popup-close svg {
      width: 20px;
      height: 20px;
      fill: var(--white);
    }

    .popup-close:hover svg {
      fill: var(--dark);
    }

    .size-guide-table {
      width: 100%;
      border-collapse: collapse;
    }

    .size-guide-table th,
    .size-guide-table td {
      padding: 0.8rem;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .size-guide-table th {
      background: var(--primary);
      color: #1a1a1a;
      font-weight: 700;
      font-size: 0.9rem;
    }

    .size-guide-table td {
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.85rem;
    }

    .size-guide-table tr:hover {
      background: rgba(201, 169, 98, 0.08);
    }

    /* ========================================
       RESPONSIVE STYLES
       ======================================== */
    @media (max-width: 1024px) {
      .product-details-wrapper {
        grid-template-columns: 1fr;
        gap: 2.5rem;
        padding: 2rem 1.5rem;
      }

      .product-gallery {
        position: static;
      }

      .main-image {
        height: 400px;
      }
    }

    @media (max-width: 768px) {
      .header-top {
        padding: 0.8rem 1rem;
      }

      .nav-links {
        display: none;
      }

      .breadcrumb {
        padding: 1rem;
      }

      .main-image {
        height: 320px;
      }

      .product-title {
        font-size: 1.8rem;
      }

      .product-price {
        font-size: 1.6rem;
      }

      .feature-list {
        grid-template-columns: 1fr;
      }

      .action-buttons {
        flex-direction: column;
      }

      .wishlist-btn {
        width: 100%;
        border-radius: 30px;
      }
    }

    @media (max-width: 480px) {
      .header-actions .header-btn {
        display: none;
      }

      .thumbnail {
        width: 65px;
        height: 65px;
      }

      .product-title {
        font-size: 1.5rem;
      }

      .size-options {
        gap: 0.5rem;
      }

      .size-option {
        min-width: 45px;
        padding: 0.5rem 0.8rem;
        font-size: 0.8rem;
      }
    }

    /* Toast Notifications */
    .toast-container {
      position: fixed;
      top: 100px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      background: var(--dark-secondary);
      border: 1px solid rgba(201, 169, 98, 0.2);
      border-radius: 12px;
      padding: 1rem 1.5rem;
      min-width: 300px;
      max-width: 400px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      transform: translateX(120%);
      animation: toastSlideIn 0.4s ease forwards;
      pointer-events: auto;
    }

    @keyframes toastSlideIn {
      to { transform: translateX(0); }
    }

    .toast.toast-exit {
      animation: toastSlideOut 0.3s ease forwards;
    }

    @keyframes toastSlideOut {
      to { transform: translateX(120%); opacity: 0; }
    }

    .toast-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toast-icon svg {
      width: 22px;
      height: 22px;
    }

    .toast.success .toast-icon {
      background: rgba(34, 197, 94, 0.15);
    }

    .toast.success .toast-icon svg {
      fill: #22c55e;
    }

    .toast-content {
      flex: 1;
    }

    .toast-title {
      font-weight: 600;
      color: var(--white);
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .toast-message {
      color: var(--gray);
      font-size: 0.85rem;
    }

    .toast-close {
      background: none;
      border: none;
      color: var(--gray);
      cursor: pointer;
      padding: 4px;
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s;
    }

    .toast-close:hover {
      color: var(--white);
    }
  </style>
</head>

    // ========================================
    // CURRENT PRODUCT STATE
    // ========================================
    let currentProduct = null;
    let currentImageIndex = 0;
    let selectedVariantIndex = 0;
    let selectedSize = null;
    let quantity = 1;

    // ========================================
    // URL PARAMETER PARSING
    // ========================================
    function getProductParams() {
      const params = new URLSearchParams(window.location.search);
      return {
        id: params.get('product') || 'kitenge-shirt',
        price: params.get('price'),
        image: params.get('image')
      };
    }

    // ========================================
    // LOAD PRODUCT
    // ========================================
    function loadProduct(productId) {
      const params = getProductParams();
      let product = products[productId];
      
      if (!product) {
        // Use default product if not found
        product = products['kitenge-shirt'];
      }

      // Clone product to avoid modifying original
      currentProduct = JSON.parse(JSON.stringify(product));

      // Override with URL parameters if present
      if (params.price) {
        currentProduct.price = parseInt(params.price);
      }
      if (params.image) {
        // Add URL image to the beginning of images array if not already there
        if (!currentProduct.images.includes(params.image)) {
          currentProduct.images.unshift(params.image);
        }
      }

      // Update page title
      document.title = `${currentProduct.name} | African Artifacts`;

      // Update breadcrumb
      document.getElementById('breadcrumb-product').textContent = currentProduct.name;

      // Update product info
      document.getElementById('product-category').textContent = currentProduct.category;
      document.getElementById('product-title').textContent = currentProduct.name;
      document.getElementById('product-price').textContent = currentProduct.price.toLocaleString();
      document.getElementById('product-description').textContent = currentProduct.description;
      
      // Original price
      const originalPriceEl = document.getElementById('original-price');
      if (currentProduct.originalPrice) {
        originalPriceEl.textContent = `KSh ${currentProduct.originalPrice.toLocaleString()}`;
        originalPriceEl.style.display = 'inline';
      } else {
        originalPriceEl.style.display = 'none';
      }

      // Load images
      loadImages();

      // Load variants (formerly colors)
      loadVariants();

      // Load sizes
      loadSizes();

      // Load features
      loadFeatures();

      // Set defaults
      selectedVariantIndex = 0;
      selectedSize = currentProduct.sizes[Math.floor(currentProduct.sizes.length / 2)];
      updateSelectedOptions();
    }

    // ========================================
    // IMAGE GALLERY
    // ========================================
    function loadImages() {
      const mainImage = document.getElementById('main-image');
      const thumbnailContainer = document.getElementById('thumbnail-container');
      
      mainImage.src = currentProduct.images[0];
      thumbnailContainer.innerHTML = '';

      currentProduct.images.forEach((img, index) => {
        const thumb = document.createElement('img');
        thumb.src = img;
        thumb.alt = currentProduct.name;
        thumb.className = `thumbnail ${index === 0 ? 'active' : ''}`;
        thumb.onclick = () => changeImageTo(index);
        thumbnailContainer.appendChild(thumb);
      });
    }

    function changeImage(direction) {
      currentImageIndex += direction;
      if (currentImageIndex < 0) currentImageIndex = currentProduct.images.length - 1;
      if (currentImageIndex >= currentProduct.images.length) currentImageIndex = 0;
      changeImageTo(currentImageIndex);
    }

    function changeImageTo(index) {
      currentImageIndex = index;
      document.getElementById('main-image').src = currentProduct.images[index];
      
      document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
        thumb.classList.toggle('active', i === index);
      });
    }

    // ========================================
    // STYLE/VARIANT SELECTION
    // ========================================
    function loadVariants() {
      const variantOptions = document.getElementById('variant-options');
      if (!variantOptions) return;
      variantOptions.innerHTML = '';

      // We'll use the product images as variants
      currentProduct.images.forEach((img, index) => {
        const variantEl = document.createElement('div');
        variantEl.className = `variant-option ${index === 0 ? 'selected' : ''}`;
        variantEl.innerHTML = `<img src="${img}" alt="Style ${index + 1}">`;
        variantEl.onclick = () => selectVariant(variantEl, index);
        variantOptions.appendChild(variantEl);
      });

      // Set initial variant name
      document.getElementById('selected-variant-name').textContent = `Style 0${1}`;
    }

    function selectVariant(element, index) {
      document.querySelectorAll('.variant-option').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      
      // Update selected variant name
      document.getElementById('selected-variant-name').textContent = `Style 0${index + 1}`;
      
      // Update main image to selected variant
      changeImageTo(index);
      
      // Save selected variant index
      selectedVariantIndex = index;
    }

    // ========================================
    // SIZE SELECTION
    // ========================================
    function loadSizes() {
      const sizeOptions = document.getElementById('size-options');
      sizeOptions.innerHTML = '';

      currentProduct.sizes.forEach((size, index) => {
        const sizeEl = document.createElement('div');
        sizeEl.className = 'size-option';
        sizeEl.textContent = size;
        sizeEl.dataset.size = size;
        sizeEl.onclick = () => selectSize(sizeEl, size);
        sizeOptions.appendChild(sizeEl);
      });
    }

    function selectSize(element, sizeName) {
      document.querySelectorAll('.size-option').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected');
      selectedSize = sizeName;
      document.getElementById('selected-size').textContent = sizeName;
    }

    function updateSelectedOptions() {
      // Update variant display
      document.getElementById('selected-variant-name').textContent = `Style 0${selectedVariantIndex + 1}`;
      
      // Update size display
      if (selectedSize) {
        document.getElementById('selected-size').textContent = selectedSize;
      }
    }

    // ========================================
    // FEATURES
    // ========================================
    function loadFeatures() {
      const featureList = document.getElementById('feature-list');
      featureList.innerHTML = '';

      currentProduct.features.forEach(feature => {
        const li = document.createElement('li');
        li.textContent = feature;
        featureList.appendChild(li);
      });
    }

    // ========================================
    // QUANTITY
    // ========================================
    function changeQuantity(change) {
      quantity += change;
      if (quantity < 1) quantity = 1;
      if (quantity > 10) quantity = 10;
      document.getElementById('quantity').textContent = quantity;
    }

    // ========================================
    // ADD TO CART
    // ========================================
    function addToCart() {
      const btn = document.querySelector('.add-to-cart-btn');
      setLoading(btn, true);

      // Initialize cart if not exists
      if (!localStorage.getItem('cart')) {
        localStorage.setItem('cart', JSON.stringify([]));
      }

      const cart = JSON.parse(localStorage.getItem('cart'));
      
      const selectedImage = currentProduct.images[selectedVariantIndex];
      const selectedVariantName = `Style 0${selectedVariantIndex + 1}`;

      const cartItem = {
        id: currentProduct.id,
        name: currentProduct.name,
        price: currentProduct.price,
        quantity: quantity,
        image: selectedImage,
        variant: selectedVariantName,
        size: selectedSize || 'One Size'
      };

      // Check if product exists
      const existingIndex = cart.findIndex(item => item.id === cartItem.id && item.variant === cartItem.variant && item.size === cartItem.size);
      
      if (existingIndex > -1) {
        cart[existingIndex].quantity += quantity;
      } else {
        cart.push(cartItem);
      }

      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      
      setTimeout(() => {
        setLoading(btn, false);
        
        showPopup({
          title: 'Added to Cart',
          subtitle: 'Your item has been successfully added to the shopping cart.',
          content: `
            <div style="display: flex; gap: 1rem; align-items: center; background: rgba(255,255,255,0.03); padding: 1rem; border-radius: 12px; border: 1px solid rgba(201,169,98,0.2);">
              <img src="${selectedImage}" style="width: 70px; height: 70px; border-radius: 8px; object-fit: cover;">
              <div>
                <div style="font-weight: 700; color: #fff; font-size: 1rem; margin-bottom: 4px;">${currentProduct.name}</div>
                <div style="font-size: 0.85rem; color: #888;">${selectedSize} | ${selectedVariantName} | Qty: ${quantity}</div>
                <div style="font-weight: 600; color: #c9a962; margin-top: 4px;">KSh ${(currentProduct.price * quantity).toLocaleString()}</div>
              </div>
            </div>
          `,
          confirmText: 'Checkout Now',
          cancelText: 'Continue Shopping',
          onConfirm: () => {
            window.location.href = 'cart.html';
          }
        });
      }, 600);
    }

    // ========================================
    // ADD TO WISHLIST
    // ========================================
    function addToWishlist() {
      const btn = document.querySelector('.wishlist-btn');
      setLoading(btn, true);

      // Initialize wishlist if not exists
      if (!localStorage.getItem('wishlist')) {
        localStorage.setItem('wishlist', JSON.stringify([]));
      }

      const wishlist = JSON.parse(localStorage.getItem('wishlist'));
      
      const wishlistItem = {
        id: currentProduct.id,
        name: currentProduct.name,
        price: currentProduct.price,
        image: currentProduct.images[0]
      };

      // Check if product exists
      const exists = wishlist.some(item => item.id === wishlistItem.id);
      
      setTimeout(() => {
        setLoading(btn, false);
        if (!exists) {
          wishlist.push(wishlistItem);
          localStorage.setItem('wishlist', JSON.stringify(wishlist));
          showToast('Wishlist', 'Product added to wishlist', 'success');
        } else {
          showToast('Wishlist', 'Product already in wishlist', 'info');
        }
      }, 600);
    }

    // ========================================
    // CART COUNT
    // ========================================
    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const count = cart.reduce((total, item) => total + item.quantity, 0);
      const badge = document.getElementById('cartBadge');
      if (badge) {
        badge.textContent = count;
        badge.style.display = count > 0 ? 'flex' : 'none';
      }
    }

    // SIZE GUIDE
    // ========================================
    function openSizeGuide() {

                <tr><td>38</td><td>5.0</td><td>7.5</td><td>24.0</td></tr>

                <tr><td>41</td><td>8.0</td><td>10.5</td><td>26.5</td></tr>
                <tr><td>42</td><td>9.0</td><td>11.5</td><td>27.0</td></tr>
                <tr><td>43</td><td>10.0</td><td>-</td><td>28.0</td></tr>
                <tr><td>44</td><td>11.0</td><td>-</td><td>28.5</td></tr>
                <tr><td>45</td><td>12.0</td><td>-</td><td>29.5</td></tr>
              </tbody>
            </table>
          </div>
        `;
      } else if (category === 'Fabrics' || category === 'Home') {
        guideContent = `
          <div style="margin-bottom: 2rem;">
            <p style="margin-bottom: 1.5rem; color: rgba(255,255,255,0.7); line-height: 1.6;">Authentic African textiles and home products are measured in standard yards or meters.</p>
            
            <table class="size-guide-table-custom">
              <thead>
                <tr>
                  <th>Type</th>
                  <th>Width</th>
                  <th>Length</th>
                  <th>Unit</th>
                </tr>
              </thead>
              <tbody>
                <tr><td>Kitenge Fabric</td><td>45"</td><td>6</td><td>Yards</td></tr>
                <tr><td>Maasai Shuka</td><td>1.5</td><td>2.0</td><td>Meters</td></tr>

      } else {
        // Default Apparel Guide (Shirts, T-Shirts, Hoodies, Dresses)
        guideContent = `
          <div style="margin-bottom: 2rem;">
            <p style="margin-bottom: 1.5rem; color: rgba(255,255,255,0.7); line-height: 1.6;">Our garments are handcrafted, so slight variations may occur. Please use this guide as a reference for the best fit.</p>

      showPopup({

            <h4 style="color: #c9a962; margin-bottom: 1rem; font-size: 1rem;">Measurement Tips</h4>
            <div style="display: grid; gap: 1rem; font-size: 0.85rem;">

    // ========================================
    // INITIALIZE
    // ========================================
    document.addEventListener('DOMContentLoaded', function() {
      const params = getProductParams();
      loadProduct(params.id);
      updateCartCount();
    });
  </script>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    // Toast Notification Function
    function showToast(type, title, message, duration = 4000) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icons = {
        success: '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>',
        error: '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>',
        warning: '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>',
        info: '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>'
      };
      
      toast.innerHTML = `
        <div class="toast-icon">
          <svg viewBox="0 0 24 24">${icons[type] || icons.info}</svg>
        </div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
        <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
      `;
      
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.classList.add('toast-exit');
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }
  </script>
