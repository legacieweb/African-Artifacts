<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | African Artifacts</title>
    <script src="js/preloader.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/api.js"></script>
    <style>
        :root {
            --primary: #c9a962;
            --primary-dark: #a88a4a;
            --dark: #0f0f0f;
            --white: #ffffff;
            --gray: #a0a0a0;
            --error: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: var(--white);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .auth-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            background: var(--dark);
        }

        .visual-side {
            flex: 1.2;
            background: linear-gradient(rgba(15, 15, 15, 0.6), rgba(15, 15, 15, 0.6)), 
                        url('Celebrate the beauty of African textile art with….jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 4rem;
            position: relative;
        }

        .visual-side::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to top, var(--dark) 0%, transparent 100%);
        }

        .visual-content { position: relative; z-index: 2; max-width: 500px; }
        .visual-content h1 { font-size: 3rem; line-height: 1.1; margin-bottom: 1.5rem; color: var(--primary); }
        .visual-content p { color: var(--gray); font-size: 1.1rem; }

        .auth-container { width: 100%; max-width: 420px; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); letter-spacing: 2px; margin-bottom: 3rem; text-decoration: none; display: block; }
        h2 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        .subtitle { color: var(--gray); margin-bottom: 2rem; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--gray); font-size: 0.9rem; font-weight: 500; }
        
        input {
            width: 100%;
            padding: 0.9rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.07);
        }

        .input-wrapper { position: relative; }
        .toggle-password {
            position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--gray); cursor: pointer;
            display: flex; align-items: center; padding: 0.2rem;
        }
        .toggle-password:hover { color: var(--primary); }

        .btn {
            width: 100%;
            padding: 1.1rem;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--dark);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }

        .btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .loader {
            width: 20px; height: 20px;
            border: 3px solid rgba(0,0,0,0.1);
            border-top-color: var(--dark);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-text { text-align: center; margin-top: 1.5rem; color: var(--gray); font-size: 0.95rem; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            padding: 0.8rem;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        @media (max-width: 900px) { .visual-side { display: none; } body { justify-content: center; } }
    </style>
</head>
<body>
    <div class="auth-side">
        <div class="auth-container">
            <a href="index.html" class="logo">AFRICAN <span>ARTIFACTS</span></a>
            <h2>Join the tribe</h2>
            <p class="subtitle">Create an account to track your orders</p>

            <div id="errorMsg" class="error-message"></div>

            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" required placeholder="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePassword('password', this)">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirmPassword" required placeholder="••••••••">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword', this)">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn" id="submitBtn">
                    <span class="loader" id="loader"></span>
                    <span id="btnText">Create Account</span>
                </button>
            </form>

            <p class="footer-text">Already have an account? <a href="login.html" id="loginLink">Sign In</a></p>
            <div id="guestOption" style="display: none; margin-top: 1rem; text-align: center;">
                <p class="footer-text" style="margin-top: 0;">or <a href="#" onclick="handleGuestCheckout()">Continue as Guest</a></p>
            </div>
        </div>
    </div>
    
    <div class="visual-side">
        <div class="visual-content">
            <h1>Celebrate your heritage.</h1>
            <p>Join a community that values authentic craftsmanship and the rich cultural tapestry of East Africa.</p>
        </div>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.93c1.51-1.26 2.7-2.89 3.44-4.76-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5s1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/></svg>';
            } else {
                input.type = 'password';
                btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>';
            }
        }

        const signupForm = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const errorMsg = document.getElementById('errorMsg');

        // Check for redirect param
        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect');
        
        if (redirect) {
            // Update login link to keep redirect
            document.getElementById('loginLink').href = `login.html?redirect=${encodeURIComponent(redirect)}`;
            // Show guest option if coming from checkout
            if (redirect.includes('checkout')) {
                document.getElementById('guestOption').style.display = 'block';
            }
        }

        function handleGuestCheckout() {
            localStorage.setItem('isGuestCheckout', 'true');
            if (redirect) {
                window.location.href = redirect;
            } else {
                window.location.href = 'index.html';
            }
        }

        signupForm.onsubmit = async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match';
                errorMsg.style.display = 'block';
                return;
            }

            setLoading(btn, true);
            errorMsg.style.display = 'none';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            try {
                const res = await registerUser(name, email, password, confirmPassword);
                
                if (res.token) {
                    showToast('Welcome aboard!', 'success');
                    setTimeout(() => { 
                        if (redirect) {
                            window.location.href = redirect;
                        } else {
                            window.location.href = 'dashboard.html';
                        }
                    }, 1000);
                } else {
                    throw new Error(res.error || 'Registration failed');
                }
            } catch (err) {
                setLoading(btn, false);
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        };
    </script>
</body>
</html>
