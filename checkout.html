<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | African Artifacts</title>
  <script src="https://js.paystack.co/v1/inline.js"></script>
  
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #c9a962;
      --primary-dark: #a88a4a;
      --dark: #1a1a1a;
      --darker: #0f0f0f;
      --light: #f5f5f5;
      --white: #ffffff;
      --gray: #888888;
      --success: #4ade80;
      --danger: #ef4444;
      --transition: all 0.3s ease;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--dark);
      color: var(--light);
      font-size: 16px;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: var(--primary);
      transition: var(--transition);
    }

    a:hover {
      color: var(--primary-dark);
    }

    /* Header */
    .checkout-header {
      background: linear-gradient(135deg, rgba(26, 26, 26, 0.98) 0%, rgba(26, 26, 26, 0.92) 100%);
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(201, 169, 98, 0.15);
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 2px;
    }

    .logo span {
      color: var(--white);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .secure-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--success);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .secure-badge svg {
      width: 18px;
      height: 18px;
      fill: var(--success);
    }

    /* Main Layout */
    .checkout-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 2rem;
    }

    /* Form Sections */
    .checkout-section {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(201, 169, 98, 0.15);
      border-radius: 16px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .section-title .number {
      width: 28px;
      height: 28px;
      background: var(--primary);
      color: var(--dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 700;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-field.full-width {
      grid-column: span 2;
    }

    .form-field label {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
    }

    .form-field input,
    .form-field select {
      padding: 0.9rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      color: var(--white);
      font-size: 1rem;
      transition: var(--transition);
    }

    .form-field input:focus,
    .form-field select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
    }

    .form-field input::placeholder {
      color: var(--gray);
    }

    /* Order Summary */
    .order-summary {
      position: sticky;
      top: 2rem;
    }

    .summary-card {
      background: rgba(201, 169, 98, 0.05);
      border: 1px solid rgba(201, 169, 98, 0.2);
      border-radius: 16px;
      padding: 1.8rem;
    }

    .summary-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(201, 169, 98, 0.15);
    }

    .cart-items {
      max-height: 300px;
      overflow-y: auto;
      margin-bottom: 1.5rem;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      padding: 0.8rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      object-fit: cover;
    }

    .item-details {
      flex: 1;
    }

    .item-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--white);
      margin-bottom: 0.3rem;
    }

    .item-meta {
      font-size: 0.8rem;
      color: var(--gray);
    }

    .item-price {
      font-weight: 700;
      color: var(--primary);
      font-size: 0.95rem;
    }

    .summary-totals {
      border-top: 1px solid rgba(201, 169, 98, 0.15);
      padding-top: 1rem;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 0.95rem;
    }

    .total-row span:first-child {
      color: rgba(255, 255, 255, 0.7);
    }

    .total-row.final {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      border-top: 1px solid rgba(201, 169, 98, 0.15);
      padding-top: 1rem;
      margin-top: 0.5rem;
    }

    .total-row.final span:last-child {
      color: var(--primary);
    }

    /* Payment Methods */
    .payment-methods {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .payment-option {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: var(--transition);
    }

    .payment-option:hover {
      border-color: rgba(201, 169, 98, 0.4);
    }

    .payment-option.selected {
      border-color: var(--primary);
      background: rgba(201, 169, 98, 0.08);
    }

    .payment-option input {
      display: none;
    }

    .payment-radio {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .payment-option.selected .payment-radio {
      border-color: var(--primary);
    }

    .payment-option.selected .payment-radio::after {
      content: '';
      width: 10px;
      height: 10px;
      background: var(--primary);
      border-radius: 50%;
    }

    .payment-icon {
      width: 40px;
      height: 40px;
      background: rgba(201, 169, 98, 0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .payment-icon svg {
      width: 24px;
      height: 24px;
      fill: var(--primary);
    }

    .payment-info {
      flex: 1;
    }

    .payment-info h4 {
      color: var(--white);
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }

    .payment-info p {
      color: var(--gray);
      font-size: 0.85rem;
    }

    /* Checkout Button */
    .checkout-btn {
      width: 100%;
      padding: 1.2rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      border: none;
      border-radius: 12px;
      color: var(--dark);
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
    }

    .checkout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(201, 169, 98, 0.4);
    }

    .checkout-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .checkout-btn svg {
      width: 22px;
      height: 22px;
    }

    /* Mobile: Fixed checkout button at bottom */
    @media (max-width: 768px) {
      .checkout-section {
        padding-bottom: 100px;
      }
      
      .checkout-btn {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        margin: 0;
        border-radius: 0;
        padding: 1.2rem 2rem;
        z-index: 100;
        box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.3);
      }
    }

    /* Empty Cart */
    .empty-cart {
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-cart svg {
      width: 80px;
      height: 80px;
      fill: var(--gray);
      margin-bottom: 1.5rem;
    }

    .empty-cart h2 {
      color: var(--white);
      margin-bottom: 1rem;
    }

    .empty-cart p {
      color: var(--gray);
      margin-bottom: 2rem;
    }

    .empty-cart .btn-primary {
      display: inline-block;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: var(--dark);
      font-weight: 700;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Footer */
    .checkout-footer {
      text-align: center;
      padding: 2rem;
      color: var(--gray);
      font-size: 0.85rem;
      border-top: 1px solid rgba(201, 169, 98, 0.1);
      margin-top: 2rem;
    }

    .footer-logos {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    .footer-logo {
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .checkout-container {
        grid-template-columns: 1fr;
      }

      .order-summary {
        position: static;
        order: -1;
      }
    }

    @media (max-width: 768px) {
      .header-content {
        flex-direction: column;
        gap: 1rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .form-field.full-width {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="checkout-header">
    <div class="header-content">
      <a href="index.html" class="logo">AFRICAN <span>ARTIFACTS</span></a>
      <div class="header-actions">
        <a href="cart.html" style="color: var(--white); font-weight: 500;">← Back to Cart</a>
        <div class="secure-badge">
          <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
          Secure Checkout
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="checkout-container" id="checkoutContent">
    <!-- Left Column - Forms -->
    <div class="checkout-forms">
      
      <!-- Contact Information -->
      <div class="checkout-section">
        <h3 class="section-title"><span class="number">1</span> Contact Information</h3>
        <div class="form-grid">
          <div class="form-field">
            <label>First Name *</label>
            <input type="text" id="firstName" placeholder="John" required>
          </div>
          <div class="form-field">
            <label>Last Name *</label>
            <input type="text" id="lastName" placeholder="Doe" required>
          </div>
          <div class="form-field full-width">
            <label>Email Address *</label>
            <input type="email" id="email" placeholder="john@example.com" required>
          </div>
          <div class="form-field full-width">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="+254 712 345678" required>
          </div>
        </div>
      </div>

      <!-- Shipping Address -->
      <div class="checkout-section">
        <h3 class="section-title"><span class="number">2</span> Shipping Address</h3>
        <div class="form-grid">
          <div class="form-field full-width">
            <label>Street Address *</label>
            <input type="text" id="address" placeholder="123 Main Street" required>
          </div>
          <div class="form-field">
            <label>City *</label>
            <input type="text" id="city" placeholder="Nairobi" required>
          </div>
          <div class="form-field">
            <label>County/Region *</label>
            <input type="text" id="county" placeholder="Nairobi County" required>
          </div>
          <div class="form-field">
            <label>ZIP/Postal Code</label>
            <input type="text" id="zipCode" placeholder="00100">
          </div>
          <div class="form-field">
            <label>Country *</label>
            <select id="country" required>
              <option value="">Select Country</option>
              <option value="KE" selected>Kenya</option>
              <option value="TZ">Tanzania</option>
              <option value="UG">Uganda</option>
              <option value="RW">Rwanda</option>
              <option value="GH">Ghana</option>
              <option value="NG">Nigeria</option>
              <option value="OTHER">Other</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Payment Method -->
      <div class="checkout-section">
        <h3 class="section-title"><span class="number">3</span> Payment Method</h3>
        <div class="payment-methods">
          <label class="payment-option selected" onclick="selectPayment(this, 'card')">
            <input type="radio" name="payment" value="card" checked>
            <div class="payment-radio"></div>
            <div class="payment-icon">
              <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
            </div>
            <div class="payment-info">
              <h4>Pay with Card</h4>
              <p>Visa, Mastercard, M-Pesa</p>
            </div>
          </label>

          <label class="payment-option" onclick="selectPayment(this, 'mpesa')">
            <input type="radio" name="payment" value="mpesa">
            <div class="payment-radio"></div>
            <div class="payment-icon">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            </div>
            <div class="payment-info">
              <h4>M-Pesa</h4>
              <p>Pay directly from your M-Pesa account</p>
            </div>
          </label>

          <label class="payment-option" onclick="selectPayment(this, 'bank')">
            <input type="radio" name="payment" value="bank">
            <div class="payment-radio"></div>
            <div class="payment-icon">
              <svg viewBox="0 0 24 24"><path d="M4 10v7h3v-7H4zm6 0v7h3v-7h-3zM2 22h19v-3H2v3zm14-12v7h3v-7h-3zm-4.5-9L2 6v2h19V6l-9.5-5z"/></svg>
            </div>
            <div class="payment-info">
              <h4>Bank Transfer</h4>
              <p>Direct bank transfer</p>
            </div>
          </label>
        </div>
      </div>

    </div>

    <!-- Right Column - Order Summary -->
    <div class="order-summary">
      <div class="summary-card">
        <h3 class="summary-title">Order Summary</h3>
        
        <div class="cart-items" id="cartItems">
          <!-- Cart items will be populated by JavaScript -->
        </div>

        <div class="summary-totals">
          <div class="total-row">
            <span>Subtotal</span>
            <span id="subtotal">KSh 0</span>
          </div>
          <div class="total-row">
            <span>Shipping</span>
            <span id="shipping">KSh 0</span>
          </div>
          <div class="total-row">
            <span>Tax</span>
            <span id="tax">KSh 0</span>
          </div>
          <div class="total-row final">
            <span>Total</span>
            <span id="total">KSh 0</span>
          </div>
        </div>

        <button class="checkout-btn" onclick="processPayment()" id="checkoutBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          Pay KSh <span id="payAmount">0</span>
        </button>
      </div>
    </div>
  </main>

  <footer class="checkout-footer">
    <div class="footer-logos">
      <span class="footer-logo">🔒 SSL Secured</span>
      <span class="footer-logo">💳 PayStack</span>
    </div>
    <p>&copy; 2026 African Artifacts. All rights reserved.</p>
  </footer>

  <script>
    // PayStack Public Key
    const PAYSTACK_PUBLIC_KEY = 'pk_test_232531a5c927ef2cc67ed1b85af3f26e3b8ed2f2';

    // Currency
    const CURRENCY = 'KES';

    // Cart and totals
    let cart = [];
    let subtotal = 0;
    let shipping = 300;
    let tax = 0;
    let total = 0;

    // Load cart from localStorage
    function loadCart() {
      cart = JSON.parse(localStorage.getItem('cart')) || [];
      renderCartItems();
      calculateTotals();
    }

    // Render cart items
    function renderCartItems() {
      const container = document.getElementById('cartItems');
      
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z"/></svg>
            <h2>Your cart is empty</h2>
            <p>Add some items to your cart to checkout</p>
            <a href="index.html" class="btn-primary">Continue Shopping</a>
          </div>
        `;
        document.getElementById('checkoutBtn').disabled = true;
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="item-image">
          <div class="item-details">
            <div class="item-name">${item.name}</div>
            <div class="item-meta">Qty: ${item.quantity} | ${item.size || 'One Size'} | ${item.color || 'Default'}</div>
          </div>
          <div class="item-price">KSh ${(item.price * item.quantity).toLocaleString()}</div>
        </div>
      `).join('');
    }

    // Calculate totals
    function calculateTotals() {
      subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      
      // Free shipping for orders over KSh 10,000
      shipping = subtotal >= 10000 ? 0 : 300;
      
      // Tax (16% VAT)
      tax = Math.round(subtotal * 0);
      
      total = subtotal + shipping + tax;

      document.getElementById('subtotal').textContent = `KSh ${subtotal.toLocaleString()}`;
      document.getElementById('shipping').textContent = shipping === 0 ? 'FREE' : `KSh ${shipping.toLocaleString()}`;
      document.getElementById('tax').textContent = `KSh ${tax.toLocaleString()}`;
      document.getElementById('total').textContent = `KSh ${total.toLocaleString()}`;
      document.getElementById('payAmount').textContent = total.toLocaleString();
    }

    // Select payment method
    function selectPayment(element, method) {
      document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
      element.classList.add('selected');
      element.querySelector('input').checked = true;
    }

    // Validate form
    function validateForm() {
      const required = ['firstName', 'lastName', 'email', 'phone', 'address', 'city', 'county'];
      let valid = true;

      required.forEach(id => {
        const field = document.getElementById(id);
        if (!field.value.trim()) {
          field.style.borderColor = '#ef4444';
          valid = false;
        } else {
          field.style.borderColor = 'rgba(255, 255, 255, 0.1)';
        }
      });

      return valid;
    }

    // Process payment with PayStack
    function processPayment() {
      if (!validateForm()) {
        showAlertToast('error', 'Missing Fields', 'Please fill in all required fields');
        return;
      }

      if (cart.length === 0) {
        showAlertToast('warning', 'Empty Cart', 'Your cart is empty');
        return;
      }

      const email = document.getElementById('email').value;
      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const phone = document.getElementById('phone').value;

      const handler = PaystackPop.setup({
        key: PAYSTACK_PUBLIC_KEY,
        email: email,
        amount: total * 100, // PayStack expects amount in kobo/cents
        currency: CURRENCY,
        ref: 'AA' + Math.floor(Math.random() * 1000000000),
        callback: function(response) {
          // Payment successful
          const reference = response.reference;
          
          // Save order to localStorage
          const order = {
            id: 'ORD' + Date.now(),
            reference: reference,
            customer: {
              firstName,
              lastName,
              email,
              phone,
              address: document.getElementById('address').value,
              city: document.getElementById('city').value,
              county: document.getElementById('county').value,
              country: document.getElementById('country').value
            },
            items: cart,
            subtotal,
            shipping,
            tax,
            total,
            status: 'paid',
            date: new Date().toISOString()
          };

          // Save order
          const orders = JSON.parse(localStorage.getItem('orders')) || [];
          orders.push(order);
          localStorage.setItem('orders', JSON.stringify(orders));

          // Clear cart
          localStorage.setItem('cart', JSON.stringify([]));

          // Show success popup toast and redirect
          showPaymentSuccess(reference, order.id);
        },
        onClose: function() {
          // Payment modal closed
          console.log('Payment cancelled');
        }
      });

      handler.openIframe();
    }

    // Show payment success popup
    function showPaymentSuccess(reference, orderId) {
      const overlay = document.getElementById('popupToastOverlay');
      const popup = document.getElementById('popupToast');
      const titleEl = document.getElementById('popupToastTitle');
      const messageEl = document.getElementById('popupToastMessage');
      const btn = document.querySelector('.popup-toast-btn');
      
      popup.className = 'popup-toast success';
      titleEl.textContent = 'Payment Successful!';
      messageEl.innerHTML = `Thank you for your purchase!<br>Order Reference: <strong>${reference}</strong>`;
      btn.textContent = 'View Order';
      btn.onclick = function() {
        window.location.href = 'order-confirmation.html?order=' + orderId;
      };
      
      overlay.classList.add('active');
      popup.classList.add('active');
    }

    // Alert toast helper
    function showAlertToast(type, title, message) {
      const overlay = document.getElementById('popupToastOverlay');
      const popup = document.getElementById('popupToast');
      const icon = document.getElementById('popupToastIcon');
      const titleEl = document.getElementById('popupToastTitle');
      const messageEl = document.getElementById('popupToastMessage');
      const btn = document.querySelector('.popup-toast-btn');
      
      const icons = {
        success: '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>',
        error: '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>',
        warning: '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>'
      };
      
      popup.className = `popup-toast ${type}`;
      icon.innerHTML = icons[type] || icons.info;
      titleEl.textContent = title;
      messageEl.textContent = message;
      btn.textContent = 'OK';
      btn.onclick = closePopupToast;
      
      overlay.classList.add('active');
      popup.classList.add('active');
    }

    function closePopupToast() {
      document.getElementById('popupToastOverlay').classList.remove('active');
      document.getElementById('popupToast').classList.remove('active');
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', loadCart);
  </script>

  <!-- Popup Toast -->
  <div class="popup-toast-overlay" id="popupToastOverlay"></div>
  <div class="popup-toast" id="popupToast">
    <div class="popup-toast-icon">
      <svg viewBox="0 0 24 24" id="popupToastIcon"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
    </div>
    <h3 class="popup-toast-title" id="popupToastTitle">Success!</h3>
    <p class="popup-toast-message" id="popupToastMessage">Operation completed</p>
    <button class="popup-toast-btn" onclick="closePopupToast()">OK</button>
  </div>
